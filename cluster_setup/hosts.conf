# MPI hostfile — one entry per physical machine
# Format:  <hostname_or_ip>  slots=<number_of_cores>
#
# Adjust hostnames and slot counts to match your hardware.
# Example: 3 machines × 4 cores = 12 total MPI slots
#
# To verify connectivity:
#   for h in node1 node2 node3; do ssh $h hostname; done

node1 slots=4
node2 slots=4
node3 slots=4
